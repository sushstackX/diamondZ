<nav class="navbar">

  <!-- LOGO -->
  <div class="logo" routerLink="/">
    <img src="../assets/images/logo.png" />
  </div>

  <!-- MOBILE MENU BUTTON -->
  <div class="menu-toggle" (click)="toggleMenu()">

    <span [class.active]="isMenuOpen"></span>
    <span [class.active]="isMenuOpen"></span>
    <span [class.active]="isMenuOpen"></span>

  </div>

  <!-- NAVIGATION -->
  <div class="nav-wrapper" [class.open]="isMenuOpen">

    <div class="nav-links">

      <a
        routerLink="/"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        (click)="closeMenu()">

        Home

      </a>

      <!-- DROPDOWN -->
      <div class="dropdown">

        <a
          class="dropdown-toggle"
          (click)="toggleServices()">

          Services ▾

        </a>

        <div
          class="dropdown-menu"
          *ngIf="isServicesOpen">

          <a
            *ngFor="let service of services"
            [routerLink]="service.route"
            (click)="closeDropdown(); closeMenu()">

            {{ service.name }}

          </a>

        </div>

      </div>

      <a
        routerLink="/about"
        routerLinkActive="active"
        (click)="closeMenu()">

        About

      </a>

      <a
        routerLink="/contact"
        routerLinkActive="active"
        (click)="closeMenu()">

        Contact

      </a>

    </div>

    <!-- BUTTON -->
    <button
      routerLink="/quote"
      class="quote-btn"
      (click)="closeMenu()">

      Get A Quote

    </button>

  </div>

</nav>
