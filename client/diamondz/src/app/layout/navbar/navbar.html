<nav class="navbar">

  <!-- LOGO -->
  <div class="logo" routerLink="/">
    <img src="../assets/images/logo.png" />
    <p>Paint Protection Film</p>
  </div>

  <!-- MOBILE MENU BUTTON -->
  <div class="menu-toggle" (click)="toggleMenu()">

    <span [class.active]="isMenuOpen"></span>
    <span [class.active]="isMenuOpen"></span>
    <span [class.active]="isMenuOpen"></span>

  </div>

  <!-- NAVIGATION -->
  <div class="nav-wrapper" [class.open]="isMenuOpen">

    <div class="nav-links">

      <a
        routerLink="/"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        (click)="closeMenu()">

        Home

      </a>

      <!-- DROPDOWN -->
      <div class="dropdown">

        <a
          class="dropdown-toggle"
          (click)="toggleServices()">

          Services ▾

        </a>

        <div
          class="dropdown-menu"
          *ngIf="isServicesOpen">

          <a
            *ngFor="let service of services"
            [routerLink]="service.route"
            (click)="closeDropdown(); closeMenu()">

            {{ service.name }}

          </a>

        </div>

      </div>

      <a
        routerLink="/about"
        routerLinkActive="active"
        (click)="closeMenu()">

        About

      </a>

      <a
        routerLink="/contact"
        routerLinkActive="active"
        (click)="closeMenu()">

        Contact

      </a>

      <!-- <a
        routerLink="/admin"
        routerLinkActive="active"
        (click)="closeMenu()">

        Admin

      </a> -->

    </div>

    <!-- BUTTON -->
    <button
      class="quote-btn"
      (click)="openQuotePopup()">

      Get A Quote

    </button>
  </div>

</nav>

<!-- =========================
     QUOTE POPUP
========================= -->

<div
  class="quote-popup-overlay"
  *ngIf="showQuotePopup"
  (click)="closeQuotePopup()">

  <div
    class="quote-popup-content"
    (click)="$event.stopPropagation()">

    <!-- CLOSE BUTTON -->

    <button
      class="close-popup"
      (click)="closeQuotePopup()">

      ✕

    </button>

    <!-- QUOTE COMPONENT -->

    <app-quote></app-quote>

  </div>

</div>
