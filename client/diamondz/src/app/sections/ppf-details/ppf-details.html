<ng-container *ngIf="!loading && pageData; else waitingState">

  <div class="gloss-wrapper">

    <div class="gloss-container">

      <!-- HEADER -->
      <div class="header">

        <h1>{{ pageData.title }}</h1>

        <p>{{ pageData.subtitle }}</p>

      </div>

      <div class="content">

        <!-- INTRO -->
        <div class="intro-card">

          <!-- TOP -->
          <div class="intro-top">

            <img
              [src]="introImage"
              alt="PPF Image"
            />

            <div class="intro-text">

              <h2>{{ pageData.introTitle }}</h2>

              <p>
                {{ pageData.introDesc }}
              </p>

            </div>

          </div>

          <!-- FEATURES -->
          <div class="intro-features">

            <div
              class="feature-row"
              *ngFor="let f of pageData.features"
            >

              <div class="icon">

                <lucide-icon
                  [img]="chevronIcon">
                </lucide-icon>

              </div>

              <div>

                <h4>{{ f.title }}</h4>

              </div>

            </div>

          </div>

        </div>

      </div>
          

      <!-- =========================
     WARRANTY SECTION
========================= -->

<div
  class="section"
  *ngIf="pageData.warranties?.length"
>

  <h2>
    Warranty Protection Plans
  </h2>

  <div class="warranty-plans">

    <div
      class="plan-card"
      *ngFor="let plan of pageData.warranties"
    >

      <!-- HEADER -->

      <div class="plan-header">

        <h3>
           {{ plan.years }}X
         
        </h3>

        <p>
           {{ plan.title }}
        </p>

      </div>

      <!-- BODY -->

      <div class="plan-body">

        <div
          class="plan-point"
          *ngFor="let point of plan.points"
        >

          <div class="tick">
            ✓
          </div>

          <div>
            {{ point }}
          </div>

        </div>

      </div>

    </div>

  </div>

</div>
      <!-- =========================
          GALLERY SECTION
      ========================= -->

      <div
        class="gallery-section"
        *ngIf="pageData.gallery?.length"
      >

        <div class="gallery-header">

          <h2>
            Gallery Showcase
          </h2>

          <p>
            Premium paint protection film finishes
          </p>

        </div>

        <!-- SLIDER -->

        <div class="gallery-slider">

          <div class="gallery-track">

            <div
              class="gallery-card"
              *ngFor="let image of pageData.gallery"
            >

              <img
                [src]="image"
                alt="Gallery Image"
              />

            </div>

          </div>

        </div>

      </div>

    </div>



  </div>


<app-footer></app-footer>
</ng-container>

<ng-template #waitingState>

  <div class="gloss-wrapper loading-state">

    <div class="gloss-container">

      <div class="header">

        <h1 *ngIf="loading">
          Loading details...
        </h1>

        <h1 *ngIf="!loading">
          Details unavailable
        </h1>

      </div>

    </div>

  </div>

</ng-template>
