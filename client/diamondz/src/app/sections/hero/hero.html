<section class="hero">

  <!-- BACKGROUND -->
  <div class="hero-bg">

    <img
      *ngFor="let slide of slides; let i = index"
      [src]="slide.image"
      class="slide-image"
      [class.active]="i === currentIndex"
      alt=""
    />

  </div>

  <!-- CONTENT -->
  <div class="hero-content">

    <p class="hero-top">
      {{ slides[currentIndex].top }}
    </p>

    <div class="hero-line"></div>

    <h1 class="hero-title">

      <span class="title1">
        {{ slides[currentIndex]?.title1 }}
      </span>

      <strong class="white">
        {{ slides[currentIndex]?.white }}
      </strong>

      <span class="title2">
        {{ slides[currentIndex]?.title2 }}
      </span>

    </h1>

    <h2 class="hero-subtitle">
      {{ slides[currentIndex].subtitle }}
    </h2>

    <p class="hero-desc">
      {{ slides[currentIndex].desc }}
    </p>

  </div>

</section>
